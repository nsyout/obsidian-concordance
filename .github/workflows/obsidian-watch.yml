name: Obsidian stable watch

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Compare Obsidian stable to minAppVersion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_RELEASES_URL: https://raw.githubusercontent.com/obsidianmd/obsidian-releases/master/desktop-releases.json
        run: |
          set -euo pipefail

          LATEST=$(curl -fsSL "$DESKTOP_RELEASES_URL" | jq -r '.latestVersion')
          MIN=$(node -p "require('./manifest.json').minAppVersion")

          if ! printf '%s' "$LATEST" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Unexpected latestVersion from desktop-releases.json: $LATEST" >&2
            exit 1
          fi

          echo "Stable Obsidian: $LATEST"
          echo "Plugin minAppVersion: $MIN"

          HIGHER=$(printf '%s\n%s\n' "$LATEST" "$MIN" | sort -V | tail -1)
          if [ "$HIGHER" = "$MIN" ]; then
            echo "Plugin minAppVersion is at or above latest stable; nothing to do."
            exit 0
          fi

          TITLE="Obsidian stable is at $LATEST (minAppVersion is $MIN)"

          EXISTING=$(gh issue list --state all --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "An issue with this exact title already exists (open or closed); skipping."
            exit 0
          fi

          gh issue create \
            --title "$TITLE" \
            --body "Stable Obsidian is at **$LATEST**; this plugin's minAppVersion is **$MIN**. Decide whether to raise the floor in manifest.json and pin the obsidian devDep in lockstep, or close this issue to acknowledge and stay on $MIN."
