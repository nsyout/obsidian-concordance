name: Obsidian API floor check

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "manifest.json"
      - "scripts/obsidian-api-versions.json"
      - "scripts/check-min-app-version.mjs"
      - ".github/workflows/obsidian-watch.yml"
  pull_request:
    paths:
      - "src/**"
      - "manifest.json"
      - "scripts/obsidian-api-versions.json"
      - "scripts/check-min-app-version.mjs"
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Compare manifest.json minAppVersion against imports
        id: check
        run: |
          set +e
          node scripts/check-min-app-version.mjs > /tmp/floor-check.txt 2>&1
          STATUS=$?
          set -e
          cat /tmp/floor-check.txt
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Fail PRs on a bad floor
        if: github.event_name == 'pull_request' && steps.check.outputs.status != '0'
        run: exit 1

      - name: Open issue on failure
        if: >-
          github.event_name != 'pull_request' &&
          steps.check.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STATUS="${{ steps.check.outputs.status }}"
          if [ "$STATUS" = "1" ]; then
            TITLE="minAppVersion is below the honest floor for current imports"
          else
            TITLE="Obsidian API floor check: unknown symbols in source"
          fi

          EXISTING=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open issue with this title already exists; skipping."
            exit 0
          fi

          {
            echo "The Obsidian API floor check failed. Output:"
            echo
            echo '```'
            cat /tmp/floor-check.txt
            echo '```'
            echo
            echo "See \`scripts/check-min-app-version.mjs\` and \`scripts/obsidian-api-versions.json\`."
          } > /tmp/issue-body.md

          gh issue create --title "$TITLE" --body-file /tmp/issue-body.md
